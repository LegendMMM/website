name: Deploy HanDan Site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: handan-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: 'ĺ–Šĺ–®ç¶˛ç«™/package-lock.json'

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: 'ĺ–Šĺ–®ç¶˛ç«™'
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/handan/
        working-directory: 'ĺ–Šĺ–®ç¶˛ç«™'
        run: |
          npm run build
          cp dist/index.html dist/404.html

      - name: Assemble site entry portal
        run: |
          mkdir -p _site/handan
          cp -R ĺ–Šĺ–®ç¶˛ç«™/dist/* _site/handan/
          cp -R websites _site/websites
          cp portal/index.html _site/index.html
          cp portal/404.html _site/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
